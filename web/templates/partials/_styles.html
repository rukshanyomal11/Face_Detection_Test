<style>
    :root {
      --ink: #0f172a;
      --muted: #5b677a;
      --brand: #0f766e;
      --brand-2: #2563eb;
      --accent: #f59e0b;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(37, 99, 235, 0.18), transparent 60%),
        radial-gradient(800px 400px at 90% 10%, rgba(15, 118, 110, 0.18), transparent 55%),
        linear-gradient(160deg, #f8fafc 0%, #f1f5f9 45%, #fff7ed 100%);
      min-height: 100vh;
    }

    .page {
      padding: 40px 20px 64px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(12px);
    }

    .header {
      padding: 56px 56px 44px;
      color: #fff;
      background: linear-gradient(120deg, #0f766e 0%, #2563eb 60%, #0ea5e9 100%);
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(600px 240px at 80% 0%, rgba(255, 255, 255, 0.25), transparent 60%);
      opacity: 0.9;
    }

    .header > * {
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .header h1 {
      font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
      font-size: 2.6rem;
      margin: 16px 0 12px;
      letter-spacing: -0.02em;
    }

    .header p {
      margin: 0;
      max-width: 680px;
      font-size: 1.08rem;
      line-height: 1.6;
      opacity: 0.92;
    }

    .header-meta {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-pill {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.16);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .content {
      padding: 36px 48px 56px;
      display: grid;
      gap: 28px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .feature {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 18px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .feature:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 32px rgba(15, 23, 42, 0.14);
    }

    .feature-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
      font-weight: 700;
      color: #0f172a;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.2), rgba(37, 99, 235, 0.22));
      margin-bottom: 12px;
    }

    .feature h3 {
      margin: 0 0 6px;
      font-size: 1.05rem;
    }

    .feature p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .tab-navigation {
      display: flex;
      gap: 6px;
      padding: 6px;
      background: var(--surface-2);
      border-radius: 999px;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tab {
      flex: 1 1 160px;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.2), rgba(37, 99, 235, 0.2));
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.45);
    }

    .tab:hover {
      color: var(--ink);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow-soft);
    }

    .upload-section { text-align: left; }

    .form-group {
      margin: 16px 0;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--ink);
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: rgba(15, 118, 110, 0.6);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
    }

    input[type="range"].form-control {
      padding: 6px 4px;
      accent-color: var(--brand);
    }

    .file-input { display: none; }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(15, 118, 110, 0.08);
      color: var(--ink);
      border-radius: 999px;
      border: 1px dashed rgba(15, 118, 110, 0.5);
      cursor: pointer;
      font-size: 0.98rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .file-label:hover {
      border-color: rgba(37, 99, 235, 0.6);
      background: rgba(37, 99, 235, 0.12);
      transform: translateY(-1px);
    }

    .btn {
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      margin: 4px 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0f766e 0%, #2563eb 100%);
      color: white;
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 26px rgba(37, 99, 235, 0.25);
    }

    .btn-secondary {
      background: #0f172a;
      color: white;
    }

    .btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .result-section { display: grid; gap: 16px; }

    .export-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .notice {
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid;
    }

    .error   { color: #991b1b; background: #fef2f2; border-color: #fecaca; }
    .success { color: #065f46; background: #ecfdf3; border-color: #a7f3d0; font-weight: 600; }
    .detection-info { color: #1e3a8a; background: #eff6ff; border-color: #bfdbfe; }

    .result-image {
      max-width: 100%;
      margin-top: 12px;
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    .analysis-summary {
      background: var(--surface-2);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid var(--border);
    }

    .analysis-summary h3 { margin-top: 0; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin: 14px 0 0;
    }

    .stat-item {
      text-align: center;
      padding: 14px;
      background: white;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--brand-2);
      font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
    }

    .stat-label { font-size: 0.9rem; color: var(--muted); }

    .face-analysis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin: 18px 0 0;
    }

    .face-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }

    .face-crop {
      width: 96px;
      height: 96px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 2px solid rgba(15, 118, 110, 0.3);
    }

    .face-details h4 { margin: 0 0 10px 0; color: var(--ink); }
    .face-details p  { margin: 6px 0; color: var(--muted); }

    .loading { display: none; text-align: center; margin: 16px 0; }

    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid var(--brand-2);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .comparison-result {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin: 16px 0 0;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }

    .similarity-score {
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      margin: 12px 0;
      font-family: "Space Grotesk", "Segoe UI", Arial, sans-serif;
    }

    .similarity-high   { color: #059669; }
    .similarity-medium { color: #d97706; }
    .similarity-low    { color: #dc2626; }

    .api-panel h4 { margin-bottom: 6px; }
    .api-panel ul { margin-top: 6px; padding-left: 18px; color: var(--muted); }

    a { color: var(--brand-2); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }

    @media (max-width: 900px) {
      .header  { padding: 40px 32px; }
      .content { padding: 28px 26px 40px; }
      .tab     { flex: 1 1 100%; }
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 2rem; }
      .page      { padding: 24px 12px 40px; }
      .panel     { padding: 18px; }
    }
</style>
