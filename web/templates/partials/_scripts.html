<script>
  function showTab(event, tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName + '-tab').classList.add('active');
    if (event && event.target) event.target.classList.add('active');
  }

  function getJsonFromScript(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    try {
      return JSON.parse(el.textContent);
    } catch (err) {
      console.warn('Failed to parse report data:', err);
      return null;
    }
  }

  function csvEscape(value) {
    if (value === null || value === undefined) return '';
    const str = String(value);
    if (/[",\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
    return str;
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function buildCsv(report, faces) {
    const lines = [];
    lines.push('Summary');
    lines.push('Metric,Value');
    lines.push(`Total Faces,${csvEscape(report.total_faces ?? 0)}`);
    if (report.average_age !== null && report.average_age !== undefined) {
      lines.push(`Average Age,${csvEscape(report.average_age)}`);
    }
    if (report.age_range && report.age_range.length === 2) {
      lines.push(`Age Range,${csvEscape(report.age_range[0])}-${csvEscape(report.age_range[1])}`);
    }
    if (report.gender_distribution) {
      Object.entries(report.gender_distribution).forEach(([gender, count]) => {
        lines.push(`Gender ${csvEscape(gender)},${csvEscape(count)}`);
      });
    }
    if (report.emotion_distribution) {
      Object.entries(report.emotion_distribution).forEach(([emotion, count]) => {
        lines.push(`Emotion ${csvEscape(emotion)},${csvEscape(count)}`);
      });
    }
    if (report.detection_methods) {
      Object.entries(report.detection_methods).forEach(([method, count]) => {
        lines.push(`Method ${csvEscape(method)},${csvEscape(count)}`);
      });
    }
    if (report.confidence_stats) {
      if (report.confidence_stats.avg !== null && report.confidence_stats.avg !== undefined) {
        lines.push(`Confidence Avg,${csvEscape(report.confidence_stats.avg)}`);
      }
      if (report.confidence_stats.min !== null && report.confidence_stats.min !== undefined) {
        lines.push(`Confidence Min,${csvEscape(report.confidence_stats.min)}`);
      }
      if (report.confidence_stats.max !== null && report.confidence_stats.max !== undefined) {
        lines.push(`Confidence Max,${csvEscape(report.confidence_stats.max)}`);
      }
    }
    if (report.confidence_histogram) {
      report.confidence_histogram.forEach(bucket => {
        lines.push(`Confidence ${csvEscape(bucket.label)},${csvEscape(bucket.count)}`);
      });
    }
    if (report.face_size_stats) {
      if (report.face_size_stats.avg_area !== null && report.face_size_stats.avg_area !== undefined) {
        lines.push(`Face Size Avg (px^2),${csvEscape(report.face_size_stats.avg_area)}`);
      }
      if (report.face_size_stats.min_area !== null && report.face_size_stats.min_area !== undefined) {
        lines.push(`Face Size Min (px^2),${csvEscape(report.face_size_stats.min_area)}`);
      }
      if (report.face_size_stats.max_area !== null && report.face_size_stats.max_area !== undefined) {
        lines.push(`Face Size Max (px^2),${csvEscape(report.face_size_stats.max_area)}`);
      }
    }
    if (report.face_size_histogram) {
      report.face_size_histogram.forEach(bucket => {
        lines.push(`Face Size ${csvEscape(bucket.label)},${csvEscape(bucket.count)}`);
      });
    }

    lines.push('');
    lines.push('Faces');
    lines.push('id,method,confidence,bbox_x1,bbox_y1,bbox_x2,bbox_y2,age,gender,emotion,race');
    (faces || []).forEach(face => {
      const bbox = Array.isArray(face.bbox) ? face.bbox : [];
      const row = [
        face.id,
        face.method,
        face.confidence,
        bbox[0],
        bbox[1],
        bbox[2],
        bbox[3],
        face.age,
        face.gender,
        face.emotion,
        face.race
      ].map(csvEscape).join(',');
      lines.push(row);
    });

    return lines.join('\n');
  }

  function exportReport(format) {
    const report = getJsonFromScript('analysis-report-json');
    const faces = getJsonFromScript('face-details-json') || (report ? report.faces : null) || [];

    if (!report) {
      alert('No report data available. Run an analysis first.');
      return;
    }

    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    let blob;
    let filename;

    if (format === 'json') {
      const payload = Object.assign({ generated_at: new Date().toISOString() }, report);
      blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      filename = `face_report_${timestamp}.json`;
    } else if (format === 'csv') {
      const csv = buildCsv(report, faces);
      blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      filename = `face_report_${timestamp}.csv`;
    } else {
      alert('Unknown export format.');
      return;
    }

    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    URL.revokeObjectURL(link.href);
    link.remove();
  }

  // ── Single image: file preview ──────────────────────────────────────────────
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const fileName = file?.name || 'No file selected';
    document.getElementById('singleFileLabel').textContent = '\uD83D\uDCF7 ' + fileName;
    if (file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('previewImage').src = ev.target.result;
        document.getElementById('imagePreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    } else {
      document.getElementById('imagePreview').style.display = 'none';
    }
  });

  // ── Single image: confidence slider ─────────────────────────────────────────
  const confidenceSlider = document.getElementById('minConfidence');
  const confidenceValue  = document.getElementById('confidenceValue');
  confidenceSlider.addEventListener('input', function() {
    confidenceValue.textContent = this.value;
  });

  // Detector comparison: file preview
  document.getElementById('detectorCompareFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const fileName = file?.name || 'No file selected';
    document.getElementById('detectorCompareFileLabel').textContent = '\uD83D\uDD0D ' + fileName;
    if (file) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('detectorComparePreview').src = ev.target.result;
        document.getElementById('detectorComparePreviewWrap').style.display = 'block';
      };
      reader.readAsDataURL(file);
    } else {
      document.getElementById('detectorComparePreviewWrap').style.display = 'none';
    }
  });

  // Detector comparison: confidence slider
  document.getElementById('detectorCompareConfidence').addEventListener('input', function() {
    document.getElementById('detectorCompareConfidenceValue').textContent = this.value;
  });

  // ── Single image: loading state ──────────────────────────────────────────────
  document.getElementById('uploadForm').addEventListener('submit', function() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('uploadBtn').disabled = true;
    document.getElementById('uploadBtn').textContent = 'Processing...';
  });

  // ── Batch processing ─────────────────────────────────────────────────────────
  async function processBatch() {
    const form = document.getElementById('batchForm');
    const formData = new FormData(form);
    const resultsDiv = document.getElementById('batchResults');

    try {
      resultsDiv.innerHTML = '<div class="loading" style="display:block;"><div class="spinner"></div><p>Processing batch...</p></div>';

      const response = await fetch('/batch-upload', { method: 'POST', body: formData });
      const data = await response.json();

      if (data.success) {
        let html = `<div class="notice success">Batch complete: ${data.total_processed} images processed.</div>`;
        data.results.forEach((result, index) => {
          html += `
            <div class="face-card">
              <h4>Image ${index + 1}</h4>
              <p><strong>Faces Detected:</strong> ${result.face_count}</p>
              ${result.error ? `<div class="notice error">Error: ${result.error}</div>` : ''}
              ${result.output_url ? `<img src="${result.output_url}" style="max-width:100%; border-radius:10px; margin-top:8px; display:block;">` : ''}
            </div>`;
        });
        resultsDiv.innerHTML = html;
      } else {
        resultsDiv.innerHTML = `<div class="notice error">Error: ${data.error}</div>`;
      }
    } catch (error) {
      resultsDiv.innerHTML = `<div class="notice error">Network Error: ${error.message}</div>`;
    }
  }

  // ── Face comparison ───────────────────────────────────────────────────────────
  async function compareFaces() {
    const form = document.getElementById('compareForm');
    const formData = new FormData(form);
    const resultsDiv = document.getElementById('comparisonResults');

    try {
      resultsDiv.innerHTML = '<div class="loading" style="display:block;"><div class="spinner"></div><p>Comparing faces...</p></div>';

      const response = await fetch('/compare-faces', { method: 'POST', body: formData });
      const data = await response.json();

      if (data.success) {
        const comparison = data.comparison;
        const similarity = Math.round(comparison.similarity * 100);
        const scoreClass = similarity > 70 ? 'similarity-high' : similarity > 40 ? 'similarity-medium' : 'similarity-low';
        resultsDiv.innerHTML = `
          <div class="comparison-result">
            <h3>Face Comparison Results</h3>
            <div class="similarity-score ${scoreClass}">${similarity}% Similar</div>
            <p><strong>Are Same Person:</strong> ${comparison.are_same ? 'Yes' : 'No'}</p>
            <p><strong>Distance Score:</strong> ${comparison.distance?.toFixed(3) || 'N/A'}</p>
            ${comparison.error ? `<div class="notice error">Note: ${comparison.error}</div>` : ''}
          </div>`;
      } else {
        resultsDiv.innerHTML = `<div class="notice error">Error: ${data.error}</div>`;
      }
    } catch (error) {
      resultsDiv.innerHTML = `<div class="notice error">Network Error: ${error.message}</div>`;
    }
  }

  // ── API test helper ───────────────────────────────────────────────────────────
  async function testAPI() {
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.jpg,.jpeg,.png';
    fileInput.addEventListener('change', async function() {
      if (this.files.length === 0) return;
      const formData = new FormData();
      formData.append('file', this.files[0]);
      formData.append('analysis_mode', 'advanced');
      formData.append('min_confidence', '0.3');
      formData.append('return_crops', 'true');
      try {
        const response = await fetch('/api/detect', { method: 'POST', body: formData });
        const data = await response.json();
        console.log('API Response:', data);
        alert('API test successful. Check console for full response.');
      } catch (error) {
        console.error('API Error:', error);
        alert('API test failed: ' + error.message);
      }
    });
    fileInput.click();
  }

  // ── Webcam confidence slider ──────────────────────────────────────────────────
  document.getElementById('webcamConfidence').addEventListener('input', function() {
    document.getElementById('webcamConfidenceValue').textContent = this.value;
  });

  // ── Webcam live detection ─────────────────────────────────────────────────────
  let _webcamStream = null;
  let _webcamLoop = null;
  let _webcamBusy = false;

  function getWebcamMode() {
    const select = document.getElementById('webcamMode');
    return select && select.value === 'accurate' ? 'accurate' : 'fast';
  }

  function getWebcamModeConfig() {
    if (getWebcamMode() === 'accurate') {
      return {
        mode: 'accurate',
        label: 'Accurate',
        maxFrameWidth: 640,
        jpegQuality: 0.82,
        startupDelayMs: 220,
        retryDelayMs: 320,
        nextDelayMs: 420
      };
    }

    return {
      mode: 'fast',
      label: 'Fast',
      maxFrameWidth: 480,
      jpegQuality: 0.72,
      startupDelayMs: 150,
      retryDelayMs: 220,
      nextDelayMs: 180
    };
  }

  function updateWebcamModeHelp() {
    const help = document.getElementById('webcamModeHelp');
    if (!help) return;

    if (getWebcamMode() === 'accurate') {
      help.textContent = 'Accurate mode uses the heavier detector pipeline. It is slower, but better for harder faces.';
      return;
    }

    help.textContent = 'Fast mode updates more smoothly. Accurate mode is slower but can detect harder faces better.';
  }

  function scheduleNextWebcamCapture(delayMs = 180) {
    if (!_webcamStream) return;
    clearTimeout(_webcamLoop);
    _webcamLoop = setTimeout(captureAndDetect, delayMs);
  }

  async function renderWebcamPreview(blob, faces) {
    const preview = document.getElementById('webcamPreview');
    const placeholder = document.getElementById('webcamPlaceholder');
    if (!preview || !placeholder || !blob) return;

    const bitmap = await createImageBitmap(blob);
    preview.width = bitmap.width;
    preview.height = bitmap.height;

    const ctx = preview.getContext('2d');
    ctx.clearRect(0, 0, preview.width, preview.height);
    ctx.drawImage(bitmap, 0, 0);
    if (typeof bitmap.close === 'function') bitmap.close();

    ctx.textBaseline = 'top';
    ctx.font = '600 15px Arial';
    ctx.lineWidth = 2;

    (faces || []).forEach((face, index) => {
      const bbox = Array.isArray(face.bbox) ? face.bbox : [];
      if (bbox.length !== 4) return;

      const [x1, y1, x2, y2] = bbox;
      const width = x2 - x1;
      const height = y2 - y1;
      if (width <= 0 || height <= 0) return;

      const color = face.method === 'MediaPipe' ? '#10b981' : '#f59e0b';
      const confidence = Number(face.confidence || 0).toFixed(2);
      const label = `Face ${index + 1} ${confidence}`;

      ctx.strokeStyle = color;
      ctx.strokeRect(x1, y1, width, height);

      const textWidth = ctx.measureText(label).width;
      const labelY = Math.max(0, y1 - 24);
      ctx.fillStyle = 'rgba(15, 23, 42, 0.85)';
      ctx.fillRect(x1, labelY, textWidth + 12, 22);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(label, x1 + 6, labelY + 4);
    });

    preview.style.display = 'block';
    placeholder.style.display = 'none';
  }

  const webcamModeSelect = document.getElementById('webcamMode');
  if (webcamModeSelect) {
    webcamModeSelect.addEventListener('change', function() {
      updateWebcamModeHelp();
      if (_webcamStream) {
        const status = document.getElementById('webcamStatus');
        const config = getWebcamModeConfig();
        status.style.display = 'block';
        status.textContent = `Switched to ${config.label.toLowerCase()} mode. Applying on the next frame...`;
      }
    });
    updateWebcamModeHelp();
  }

  async function startWebcam() {
    try {
      stopWebcam();
      const webcamConfig = getWebcamModeConfig();
      _webcamStream = await navigator.mediaDevices.getUserMedia({
        video: {
          width: { ideal: 640 },
          height: { ideal: 480 },
          facingMode: 'user'
        },
        audio: false
      });
      const video = document.getElementById('webcamVideo');
      video.srcObject = _webcamStream;
      video.play().catch(() => {});
      document.getElementById('stopWebcamBtn').disabled = false;
      const status = document.getElementById('webcamStatus');
      status.style.display = 'block';
      status.textContent = `Starting ${webcamConfig.label.toLowerCase()} webcam detection...`;
      scheduleNextWebcamCapture(webcamConfig.startupDelayMs);
    } catch (err) {
      alert('Camera access denied or unavailable: ' + err.message);
    }
  }

  // Detector comparison
  async function compareDetectors() {
    const form = document.getElementById('detectorCompareForm');
    const fileInput = document.getElementById('detectorCompareFile');
    const resultsDiv = document.getElementById('detectorCompareResults');
    const selectedDetectors = Array.from(
      document.querySelectorAll('#detectorCompareForm input[name="detectors"]:checked')
    );

    if (!fileInput.files || fileInput.files.length === 0) {
      resultsDiv.innerHTML = '<div class="notice error">Please choose an image to compare detectors.</div>';
      return;
    }

    if (selectedDetectors.length === 0) {
      resultsDiv.innerHTML = '<div class="notice error">Select at least one detector to compare.</div>';
      return;
    }

    const formData = new FormData(form);

    try {
      resultsDiv.innerHTML = '<div class="loading" style="display:block;"><div class="spinner"></div><p>Running detector comparison...</p></div>';

      const response = await fetch('/compare-detectors', { method: 'POST', body: formData });
      const data = await response.json();

      if (!response.ok || !data.success) {
        throw new Error(data.detail || data.error || 'Detector comparison failed');
      }

      const comparison = data.comparison || {};
      const summary = comparison.summary || {};
      const detectors = comparison.detectors || [];
      const bestDetectors = Array.isArray(summary.best_detectors) ? summary.best_detectors : [];

      let html = `
        <div class="detector-overview">
          <h3>Detector Comparison Summary</h3>
          <p>
            Compared ${summary.successful_detectors || 0} working detector(s) out of ${summary.requested_detectors || detectors.length}.
            Agreement level: <strong>${escapeHtml(summary.agreement || 'Unavailable')}</strong>.
          </p>
          <div class="stat-grid">
            <div class="stat-item">
              <div class="stat-number">${summary.available_detectors ?? 0}</div>
              <div class="stat-label">Available Detectors</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">${summary.average_faces ?? 0}</div>
              <div class="stat-label">Average Faces</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">${summary.max_faces ?? 0}</div>
              <div class="stat-label">Highest Count</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">${summary.count_spread ?? 0}</div>
              <div class="stat-label">Count Spread</div>
            </div>
          </div>
          ${bestDetectors.length ? `
            <div class="chip-row" style="margin-top:14px;">
              ${bestDetectors.map(label => `<span class="chip">Top Count: ${escapeHtml(label)}</span>`).join('')}
            </div>` : ''}
        </div>
        <div class="detector-compare-grid">
      `;

      detectors.forEach(detector => {
        const analysisReport = detector.analysis_report || {};
        const confidenceStats = analysisReport.confidence_stats || {};
        const faces = Array.isArray(detector.faces) ? detector.faces : [];
        const detectedMethods = detector.summary?.detected_methods || [];
        const isUnavailable = !detector.available;
        const statusLabel = isUnavailable ? 'Unavailable' : (detector.error ? 'Error' : 'Ready');
        const statusClass = isUnavailable ? 'offline' : '';
        const avgConfidence = confidenceStats.avg !== undefined && confidenceStats.avg !== null
          ? Number(confidenceStats.avg).toFixed(2)
          : 'N/A';
        const topConfidence = confidenceStats.max !== undefined && confidenceStats.max !== null
          ? Number(confidenceStats.max).toFixed(2)
          : 'N/A';
        const methodsHtml = detectedMethods.length
          ? detectedMethods.map(method => `<span class="chip">${escapeHtml(method)}</span>`).join('')
          : '<span class="chip">No detections</span>';
        const facesHtml = faces.length
          ? `<div class="detector-face-list">${faces.slice(0, 4).map(face => `
              <div class="detector-face-item">
                <span>Face ${face.id} (${escapeHtml(face.method || 'Unknown')})</span>
                <span>${Number(face.confidence || 0).toFixed(2)}</span>
              </div>
            `).join('')}</div>`
          : '<div class="stat-label">No faces returned for this detector at the selected threshold.</div>';
        const mediaHtml = detector.output_url
          ? `<img src="${escapeHtml(detector.output_url)}" alt="${escapeHtml(detector.label)} detector output">`
          : `<div class="detector-placeholder">${escapeHtml(detector.error || 'No annotated output available.')}</div>`;
        const noteClass = detector.error && detector.available ? 'error' : 'detection-info';
        const noteHtml = detector.error
          ? `<div class="notice ${noteClass}">${escapeHtml(detector.error)}</div>`
          : '';

        html += `
          <article class="detector-result-card ${isUnavailable ? 'is-unavailable' : ''}">
            <div class="detector-card-header">
              <div>
                <h3>${escapeHtml(detector.label)}</h3>
                <p>${escapeHtml(detector.description || '')}</p>
              </div>
              <span class="detector-status ${statusClass}">${escapeHtml(statusLabel)}</span>
            </div>
            <div class="detector-media">${mediaHtml}</div>
            ${noteHtml}
            <div class="detector-metrics">
              <div class="detector-metric">
                <div class="detector-metric-value">${detector.face_count ?? 0}</div>
                <div class="detector-metric-label">Faces Found</div>
              </div>
              <div class="detector-metric">
                <div class="detector-metric-value">${avgConfidence}</div>
                <div class="detector-metric-label">Average Confidence</div>
              </div>
              <div class="detector-metric">
                <div class="detector-metric-value">${topConfidence}</div>
                <div class="detector-metric-label">Top Confidence</div>
              </div>
              <div class="detector-metric">
                <div class="detector-metric-value">${analysisReport.face_size_stats?.avg_area ?? 'N/A'}</div>
                <div class="detector-metric-label">Avg Face Area</div>
              </div>
            </div>
            <div class="chip-row">${methodsHtml}</div>
            ${facesHtml}
          </article>
        `;
      });

      html += '</div>';
      resultsDiv.innerHTML = html;
    } catch (error) {
      resultsDiv.innerHTML = `<div class="notice error">Error: ${escapeHtml(error.message)}</div>`;
    }
  }

  function stopWebcam() {
    if (_webcamStream) {
      _webcamStream.getTracks().forEach(t => t.stop());
      _webcamStream = null;
    }
    clearTimeout(_webcamLoop);
    _webcamLoop = null;
    _webcamBusy = false;
    document.getElementById('webcamVideo').srcObject = null;
    document.getElementById('stopWebcamBtn').disabled = true;
    document.getElementById('webcamStatus').style.display = 'none';
    const preview = document.getElementById('webcamPreview');
    const placeholder = document.getElementById('webcamPlaceholder');
    preview.style.display = 'none';
    preview.width = 0;
    preview.height = 0;
    placeholder.style.display = 'block';
  }

  async function captureAndDetect() {
    if (_webcamBusy || !_webcamStream) return;
    const video = document.getElementById('webcamVideo');
    const webcamConfig = getWebcamModeConfig();
    if (video.videoWidth === 0 || video.videoHeight === 0) {
      scheduleNextWebcamCapture(webcamConfig.startupDelayMs);
      return;
    }
    _webcamBusy = true;

    const canvas = document.getElementById('webcamCanvas');
    const scale = Math.min(1, webcamConfig.maxFrameWidth / video.videoWidth);
    canvas.width = Math.max(1, Math.round(video.videoWidth * scale));
    canvas.height = Math.max(1, Math.round(video.videoHeight * scale));
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(async (blob) => {
      if (!blob) {
        _webcamBusy = false;
        scheduleNextWebcamCapture(webcamConfig.retryDelayMs);
        return;
      }

      const requestStartedAt = performance.now();
      try {
        const fd = new FormData();
        fd.append('file', blob, 'frame.jpg');
        fd.append('min_confidence', document.getElementById('webcamConfidence').value);
        fd.append('webcam_mode', webcamConfig.mode);
        fd.append('return_frame', 'false');

        const res  = await fetch('/api/webcam-detect', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.error || 'Realtime detection failed');
        }

        await renderWebcamPreview(blob, data.faces || []);

        const status = document.getElementById('webcamStatus');
        const processingMs = Math.round(Number(data.processing_ms || 0));
        const roundtripMs = Math.round(performance.now() - requestStartedAt);
        const modeLabel = data.mode === 'accurate' ? 'accurate' : 'fast';
        status.style.display = 'block';
        status.textContent =
          `Detected ${data.face_count} face(s) in ${modeLabel} mode using ${data.detector} in ${processingMs} ms server / ${roundtripMs} ms total`;
      } catch (e) {
        console.error('Webcam detection error:', e);
        const status = document.getElementById('webcamStatus');
        status.style.display = 'block';
        status.textContent = `Realtime detection error: ${e.message}`;
      } finally {
        _webcamBusy = false;
        scheduleNextWebcamCapture(getWebcamModeConfig().nextDelayMs);
      }
    }, 'image/jpeg', webcamConfig.jpegQuality);
  }
</script>
